apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: micro-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
      - name: docker-hub-secret
      containers:
      - name: auth-service
        image: manushau/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_HOST
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: POSTGRES_HOST
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: POSTGRES_DB
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: JWT_SECRET
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: GOOGLE_CLIENT_ID
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: micro-store-config
              key: NODE_ENV
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: micro-store
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: auth-service
