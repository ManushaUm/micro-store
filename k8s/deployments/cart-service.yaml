apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: micro-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      imagePullSecrets:
      - name: docker-hub-secret
      containers:
      - name: cart-service
        image: manushau/cart-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: micro-store-secrets
              key: REDIS_URL
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: micro-store-config
              key: RABBITMQ_URL
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: micro-store-config
              key: NODE_ENV
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: micro-store
spec:
  ports:
  - port: 3003
    targetPort: 3003
  selector:
    app: cart-service
