{{- range $name, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $.Values.common.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- if $.Values.global.imagePullSecret }}
      imagePullSecrets:
      - name: {{ $.Values.global.imagePullSecret }}
      {{- end }}
      containers:
      - name: {{ $name }}
        image: "{{ $.Values.global.imageRegistry }}/{{ $service.image }}:{{ $service.tag }}"
        imagePullPolicy: {{ $.Values.common.imagePullPolicy }}
        {{- if $service.containerPort }}
        ports:
        - containerPort: {{ $service.containerPort }}
        {{- end }}
        {{- if ne $service.healthCheckEnabled false }}
        {{- if $service.containerPort }}
        readinessProbe:
          httpGet:
            path: {{ default "/health" $service.healthCheck }}
            port: {{ $service.containerPort }}
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: {{ default "/health" $service.healthCheck }}
            port: {{ $service.containerPort }}
          initialDelaySeconds: 15
          periodSeconds: 20
        {{- end }}
        {{- end }}
        envFrom:
        - secretRef:
            name: micro-store-secrets
        {{- if $service.env }}
        env:
        {{- range $key, $value := $service.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
{{- end }}
{{- end }}
