{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ if eq .Release.Namespace "staging" }}staging.{{ else }}prod.{{ end }}{{ .Values.global.domain }}
    http:
      paths:
      # API Gateway Routes
      - path: /gateway/health
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /products
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /cart
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /checkout
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /orders
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: {{ .Values.services.api-gateway.servicePort }}
      # Frontend (Catch-all)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: {{ .Values.services.frontend.servicePort }}
{{- end }}
