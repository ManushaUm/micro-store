version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopping_site
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d shopping_site"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    # Port not exposed externally — only accessible within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway (single external entry point on port 8080) ────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - catalog-service
      - cart-service
      - checkout-service
    restart: unless-stopped

  # ── Microservices (ports NOT exposed externally, internal only) ───
  auth-service:
    build: ./auth-service
    container_name: auth-service
    # No external port binding — gateway handles routing
    environment:
      - PORT=3001
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shopping_site
      - POSTGRES_HOST=postgres
      - JWT_SECRET=supersecretjwtkey
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    # No external port binding — gateway handles routing
    environment:
      - PORT=3002
      - MONGO_URI=${MONGO_URI}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME}
      - AZURE_STORAGE_ACCOUNT_KEY=${AZURE_STORAGE_ACCOUNT_KEY}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME}
      - NODE_ENV=development
    depends_on:
      rabbitmq:
        condition: service_healthy

  cart-service:
    build: ./cart-service
    container_name: cart-service
    # No external port binding — gateway handles routing
    environment:
      - PORT=3003
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  checkout-service:
    build: ./checkout-service
    container_name: checkout-service
    # No external port binding — gateway handles routing
    environment:
      - PORT=3004
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=shopping_site
      - POSTGRES_HOST=postgres
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
      - NODE_ENV=development
    depends_on:
      - api-gateway

  email-service:
    build: ./email-service
    container_name: email-service
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - RECEIVER_EMAIL=${RECEIVER_EMAIL}
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
